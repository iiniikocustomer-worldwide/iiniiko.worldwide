<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INIIKO CLOTHING | Official Store</title>
    <style>
        /* --- Brand Identity Variables --- */
        :root {
            --bg-deep: #0b0b0b;
            --bg-card: #121212;
            --bg-hover: #171717;
            --text-main: #ffffff;
            --text-muted: #888888;
            --accent-gold: #ffd700;
            --accent-neon: #ccff00;
            --border-color: #1a1a1a;
            --font-display: 'Impact', 'Arial Black', sans-serif;
            --font-body: 'Helvetica Neue', Arial, sans-serif;
        }

        /* --- Reset & Global Elements --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: var(--font-body);
            overflow-x: hidden;
            line-height: 1.5;
        }

        /* --- Header Section --- */
        header {
            border-bottom: 1px solid var(--border-color);
            padding: 2rem 1rem;
            text-align: center;
            background: linear-gradient(to bottom, #000000, var(--bg-deep));
        }

        .brand-logo {
            font-family: var(--font-display);
            font-size: 3rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }

        .brand-tagline {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-muted);
        }

        /* --- Catalog Filter Navigation --- */
        .catalog-nav {
            display: flex;
            justify-content: center;
            gap: 1rem;
            padding: 2rem 1rem 1rem 1rem;
            flex-wrap: wrap;
        }

        .filter-btn {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 0.6rem 1.5rem;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .filter-btn:hover, .filter-btn.active {
            background-color: var(--text-main);
            color: #000000;
            border-color: var(--text-main);
        }

        /* --- Product Catalog Section --- */
        .catalog-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2.5rem;
        }

        /* --- Dynamic Product Card Structure --- */
        .product-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 2px;
            overflow: hidden;
            transition: transform 0.3s ease, border-color 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .product-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent-gold);
        }

        .product-image-wrapper {
            position: relative;
            width: 100%;
            padding-top: 125%; /* Golden proportion aspect ratio for tees/jerseys */
            background: var(--bg-hover);
            overflow: hidden;
        }

        .prod-img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: opacity 0.4s ease;
        }

        .prod-img.back {
            opacity: 0;
        }

        /* Smooth double-sided garment image reveal */
        .product-image-wrapper:hover .prod-img.back {
            opacity: 1;
        }

        .category-badge {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(0, 0, 0, 0.85);
            color: var(--text-main);
            padding: 4px 10px;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            z-index: 2;
            border: 1px solid #333;
        }

        .product-info {
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .product-title {
            font-family: var(--font-display);
            text-transform: uppercase;
            font-size: 1.35rem;
            margin-bottom: 0.5rem;
            letter-spacing: 0.5px;
        }

        .product-desc {
            font-size: 0.85rem;
            color: var(--text-muted);
            line-height: 1.4;
            margin-bottom: 1.2rem;
            flex-grow: 1;
        }

        .tag-container {
            margin-bottom: 1.2rem;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .tag {
            font-size: 0.65rem;
            color: var(--accent-gold);
            background: #1a1600;
            padding: 2px 6px;
            border: 1px solid #3a3200;
            text-transform: uppercase;
        }

        /* Subtle styling switch for neon collections */
        .product-card[data-tags*="Neon"] .tag {
            color: var(--accent-neon);
            background: #111a00;
            border: 1px solid #293a00;
        }

        .product-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid var(--border-color);
            padding-top: 1rem;
            margin-top: auto;
        }

        .price {
            font-weight: bold;
            font-size: 1.2rem;
            letter-spacing: 0.5px;
        }

        .add-to-cart-btn {
            background: var(--text-main);
            color: #000000;
            border: none;
            padding: 10px 18px;
            font-weight: bold;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        .add-to-cart-btn:hover {
            background: var(--accent-gold);
        }

        /* --- Footer Section --- */
        footer {
            text-align: center;
            padding: 4rem 1rem;
            border-top: 1px solid var(--border-color);
            color: var(--text-muted);
            font-size: 0.8rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <!-- Header / Brand Intro -->
    <header>
        <div class="brand-logo">INIIKO</div>
        <div class="brand-tagline">Born in Chaos. Built for More.</div>
    </header>

    <!-- Catalog Selection Tabs -->
    <nav class="catalog-nav">
        <button class="filter-btn active" onclick="filterCatalog('All', this)">All Collections</button>
        <button class="filter-btn" onclick="filterCatalog('T-Shirts', this)">T-Shirts</button>
        <button class="filter-btn" onclick="filterCatalog('Jerseys', this)">Jerseys</button>

        <button class="filter-btn" onclick="filterCatalog('Sets', this)">Sets</button>

    <!-- Catalog Container -->
    <main class="catalog-container">
        <div class="products-grid" id="catalog-grid">
            <!-- Dynamic Injection JavaScript Target -->
        </div>
    </main>

    <!-- Footer -->
    <footer>
        &copy; 2026 INIIKO CLOTHING. STRENGTH IS NOT THE ABSENCE OF STRUGGLE, IT IS THE EXISTENCE OF PURPOSE.
    </footer>

    <!-- Functional Data & Catalog Filter Engine Script -->
    <script>

            {

            },
            {
                id: "iniiko-durban-031-tee",

                category: "T-Shirts",

                imageFront: "images/durban-front.png",

            {

                name: "Triblad Times Racing Jersey",

                tags: ["Racing Team", "Neon", "Limited Drop"]
            },
            {
                id: "iniiko-pro-racing-jersey-10",

                name: "INIIKO Women's Wide-Leg Denim",

                imageFront: "images/womens-denim-collection.png",

            },
            {
                id: "iniiko-denim-collection-mens",
                name: "INIIKO Men's Stacked Dystopia Denim",
                category: "Denim",
                price: "R1099.99",
                description: "Extra length stacked fit and baggy fit heavy denim styles with premium embroidery detailing.",
                imageFront: "images/mens-denim-collection.png",
                imageBack: "",
                tags: ["Stacked Fit", "Baggy Fit", "Distressed"]
            },
            {
                id: "iniiko-spirit-yoruba-tee",
                name: "INIIKO Spirit Yoruba Tee",
                category: "T-Shirts",
                price: "R549.99",
                description: "Washed black vintage silhouette featuring a bold purple gradient front logotype and gold diety graphic back.",
                imageFront: "images/spirit-front.png",
                imageBack: "images/spirit-back.png",
                tags: ["Yoruba Roots", "Gradient", "260GSM"]
            }
        ];

        // Generator logic rendering products dynamically
        function renderGrid(products) {
            const grid = document.getElementById('catalog-grid');
            grid.innerHTML = products.map(item => {
                const tagString = item.tags.join(' ');
                return `
                    <div class="product-card" data-category="${item.category}" data-tags="${tagString}">
                        <div class="product-image-wrapper">
                            <img src="${item.imageFront}" alt="${item.name} Front" class="prod-img front">
                            ${item.imageBack ? `<img src="${item.imageBack}" alt="${item.name} Back" class="prod-img back">` : ''}
                            <span class="category-badge">${item.category}</span>
                        </div>
                        <div class="product-info">
                            <h3 class="product-title">${item.name}</h3>
                            <p class="product-desc">${item.description}</p>
                            <div class="tag-container">
                                ${item.tags.map(t => `<span class="tag">#${t}</span>`).join('')}
                            </div>
                            <div class="product-footer">
                                <span class="price">${item.price}</span>
                                <button class="add-to-cart-btn" onclick="triggerCartDrop('${item.id}')">Add to Drop</button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Processing tab selection filtering action
        function filterCatalog(category, buttonComponent) {
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            buttonComponent.classList.add('active');

            if (category === 'All') {
                renderGrid(catalogProducts);
            } else {
                const filtered = catalogProducts.filter(p => p.category === category);
                renderGrid(filtered);
            }
        }

        // Interface event logger for customer drop interaction
        function triggerCartDrop(itemId) {
            alert(`Product added to drop selection roster: ${itemId}`);
        }

        // Initial paint call logic sequence
        window.addEventListener('DOMContentLoaded', () => {
            renderGrid(catalogProducts);
        });
    </script>
</body>
</html>
